@if (course) {
  <aside class="flex flex-col h-full">
    <div>
      <h2
        class="px-5 py-2 mt-2 font-medium select-none cursor-pointer hover:text-cyan-600"
        (click)="onSelect('')"
      >
        {{ course.title }}
      </h2>
    </div>

    <nav class="flex flex-col flex-1 overflow-y-auto custom-scrollbar">
      @for (chapter of course.chapters; track chapter.id) {
        <details class="group marker:content-['']" open>
          <summary
            class="px-5 py-2 font-medium cursor-pointer select-none flex items-center justify-between"
          >
            {{ chapter.title }}
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2.5"
              stroke="currentColor"
              class="w-3.5 h-3.5 transform transition-transform duration-200 group-open:rotate-90 opacity-40"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
          </summary>

          <ul class="flex flex-col mt-1 mb-2">
            @for (lesson of chapter.lessons; track lesson.id) {
              <li
                class="relative flex items-center justify-between py-2 px-4 mx-2 my-0.5 cursor-pointer rounded-lg transition-all duration-200
                {{
                  activeLessonId === lesson.id
                    ? 'bg-slate-100 dark:bg-white/10'
                    : 'hover:bg-slate-50 dark:hover:bg-white/5'
                }}"
                (click)="onSelect(lesson.id)"
              >
                <!-- Active Line Indicator -->
                @if (activeLessonId === lesson.id) {
                  <div class="absolute left-0 top-1 bottom-1 w-0.5 bg-cyan-400"></div>
                }

                <span class="text-sm ml-2">{{ lesson.title }}</span>

                <div class="flex items-center gap-2">
                  <!-- Completed Indicator -->
                  @if (lesson.isCompleted) {
                    <div
                      class="w-1.5 h-1.5 rounded-full bg-cyan-500 dark:bg-cyan-400 shadow-[0_0_6px_rgba(6,182,212,0.8)]"
                    ></div>
                  }
                </div>
              </li>
            }
          </ul>
        </details>
      }
    </nav>
  </aside>
} @else {
  <aside class="flex flex-col h-full animate-pulse mt-2">
    <div class="px-5 py-2">
      <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-2/3"></div>
    </div>

    <div class="flex flex-col flex-1 mt-4 space-y-6">
      <!-- Skeleton Chapter 1 -->
      <div>
        <div class="px-5 py-2">
          <div class="h-5 bg-slate-200 dark:bg-slate-800/80 rounded w-3/4"></div>
        </div>
        <ul class="flex flex-col mt-1 mb-2 space-y-1">
          <li class="py-2 px-4 mx-2">
            <div class="h-4 bg-slate-200 dark:bg-slate-800/80 rounded w-5/6 ml-2"></div>
          </li>
          <li class="py-2 px-4 mx-2">
            <div class="h-4 bg-slate-200 dark:bg-slate-800/80 rounded w-4/5 ml-2"></div>
          </li>
          <li class="py-2 px-4 mx-2">
            <div class="h-4 bg-slate-200 dark:bg-slate-800/80 rounded w-11/12 ml-2"></div>
          </li>
        </ul>
      </div>

      <!-- Skeleton Chapter 2 -->
      <div>
        <div class="px-5 py-2">
          <div class="h-5 bg-slate-200 dark:bg-slate-800/80 rounded w-2/3"></div>
        </div>
        <ul class="flex flex-col mt-1 mb-2 space-y-1">
          <li class="py-2 px-4 mx-2">
            <div class="h-4 bg-slate-200 dark:bg-slate-800/80 rounded w-4/5 ml-2"></div>
          </li>
          <li class="py-2 px-4 mx-2">
            <div class="h-4 bg-slate-200 dark:bg-slate-800/80 rounded w-full ml-2"></div>
          </li>
        </ul>
      </div>
    </div>
  </aside>
}
