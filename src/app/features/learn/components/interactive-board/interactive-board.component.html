<div
  class="w-[600px] h-[420px] mx-auto rounded-xl overflow-hidden border border-slate-300 dark:border-white/10 ring-1 ring-slate-200"
>
  @if (safeUrl) {
    <iframe
      [src]="safeUrl"
      width="100%"
      height="100%"
      frameborder="0"
      class="w-full h-full relative z-20"
      title="Lichess Interactive Study"
    ></iframe>
  } @else {
    <div
      class="flex items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 font-medium animate-pulse"
    >
      loading interactive board...
    </div>
  }
</div>
