<div class="w-[600px] h-[420px] rounded-xl overflow-hidden border border-border-theme">
  @if (safeUrl) {
    <iframe
      [src]="safeUrl"
      width="100%"
      height="100%"
      class="w-[calc(100%+10px)] h-full -ml-[5px] border-0 block"
    >
      ></iframe
    >
  } @else {
    <div
      class="flex items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 font-medium animate-pulse"
    >
      loading interactive board...
    </div>
  }
</div>
