<header class="w-full flex justify-between items-center px-8 py-5">
  <a
    routerLink="/"
    class="text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2 hover:opacity-80 transition-opacity"
  >
    CHESS.PGN
  </a>

  <div class="flex items-center gap-6 text-sm text-slate-500 dark:text-slate-400 font-medium">
    <button
      (click)="themeService.toggleTheme()"
      class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors"
      aria-label="Toggle Dark Mode"
    >
      @if (themeService.isDarkMode()) {
        <!-- Sun Icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-5 h-5 text-yellow-400"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
          />
        </svg>
      } @else {
        <!-- Moon Icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-5 h-5 text-slate-600"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
          />
        </svg>
      }
    </button>

    <a routerLink="/profile" class="flex items-center gap-2 group cursor-pointer">
      <div
        class="w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center border border-slate-300 dark:border-white/10 text-xs text-slate-700 dark:text-white transition-all group-hover:border-cyan-500/50 group-hover:shadow-[0_0_8px_rgba(6,182,212,0.4)]"
      >
        V
      </div>
      <span class="group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors"
        >von</span
      >
    </a>
  </div>
</header>
