<div class="min-h-screen w-full flex flex-col font-sans overflow-x-hidden bg-[#282A35]">
  <app-header
    class="w-full shrink-0 z-50 relative bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800"
  ></app-header>

  <div class="flex-1 w-full flex flex-col items-center pt-16 pb-24 px-8">
    <div class="max-w-[1400px] w-full mt-4">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
        <h1 class="text-4xl md:text-5xl font-bold text-[#FFF4A3]">Tutorials</h1>
        <div class="relative w-full md:w-96">
          <!-- Optional Search bar matching reference -->
          <input
            type="text"
            placeholder="Filter..."
            class="w-full bg-[#383A45] border border-slate-600 rounded-full px-5 py-3 text-white placeholder-slate-400 focus:outline-none focus:border-[#FFF4A3] transition-colors"
          />
          <button
            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Categories Grid layout (using simple 3 columns matching reference) -->
      @if (allCourses.length === 0) {
        <div class="flex justify-center items-center h-64 text-slate-400">Loading courses...</div>
      } @else {
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-16 gap-y-12 text-white">
          <!-- We are clustering everything under 'All Courses' since there are no categories yet -->
          <div>
            <h2 class="text-2xl font-semibold text-[#FFF4A3] mb-6">All Courses</h2>
            <div class="flex flex-col space-y-4">
              @for (course of allCourses; track course.id) {
                <div class="flex items-center gap-3">
                  <a
                    [routerLink]="['/learn']"
                    (click)="selectCourse(course.id)"
                    class="text-[17px] hover:text-[#04AA6D] transition-colors truncate"
                  >
                    <span class="text-slate-400 font-normal mr-1.5">Learn</span
                    ><span class="font-bold">{{ course.title }}</span>
                  </a>
                  <!-- Example Badges -->
                  <span
                    class="text-[10px] font-bold uppercase px-1.5 py-0.5 border border-slate-600 rounded text-slate-400 hover:bg-slate-700 cursor-pointer"
                    >Tutorial</span
                  >
                  <span
                    class="text-[10px] font-bold uppercase px-1.5 py-0.5 border border-slate-600 rounded text-[#04AA6D] hover:bg-[#04AA6D] hover:text-white cursor-pointer transition-colors"
                    >Reference</span
                  >
                </div>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
