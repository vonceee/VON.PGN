<div class="w-full flex flex-col overflow-x-hidden">
  <app-header></app-header>

  <div class="flex-1 flex flex-col items-center pt-16 pb-24 px-8">
    <div class="w-full mt-4">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
        <h1 class="text-4xl md:text-5xl font-bold text-cyan-400">Roadmap</h1>
        <div class="relative w-full md:w-96">
          <input
            type="text"
            placeholder="Search..."
            class="w-full bg-[#383A45] border border-slate-600 rounded-full px-5 py-3  placeholder-slate-400 focus:outline-none focus:border-cyan-400 transition-colors"
          />
          <button
            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-5 h-5"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Categories Grid Layout (using simple 3 columns matching reference) -->
      @if (allCourses.length === 0) {
        <div
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-16 gap-y-12 w-full animate-pulse"
        >
          <!-- Column 1 -->
          <div>
            <div class="h-8 bg-slate-200 dark:bg-slate-800/80 rounded w-1/2 mb-6"></div>
            <div class="flex flex-col space-y-4">
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-3/5"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-2/5"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-1/2"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-3/4"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
            </div>
          </div>
          <!-- Column 2 -->
          <div class="hidden md:block">
            <div class="h-8 bg-slate-200 dark:bg-slate-800/80 rounded w-1/3 mb-6"></div>
            <div class="flex flex-col space-y-4">
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-1/2"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-3/5"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-2/5"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
            </div>
          </div>
          <!-- Column 3 -->
          <div class="hidden lg:block">
            <div class="h-8 bg-slate-200 dark:bg-slate-800/80 rounded w-2/5 mb-6"></div>
            <div class="flex flex-col space-y-4">
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-2/3"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-1/2"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-3/4"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-2/5"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
              <div class="flex items-center gap-3">
                <div class="h-6 bg-slate-200 dark:bg-slate-800/80 rounded w-1/2"></div>
                <div class="h-5 w-12 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
                <div class="h-5 w-16 bg-slate-200 dark:bg-slate-800/80 rounded shrink-0"></div>
              </div>
            </div>
          </div>
        </div>
      } @else {
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-16 gap-y-12">
          <div>
            <h2 class="text-2xl font-semibold text-cyan-400 mb-6">All Courses</h2>
            <div class="flex flex-col space-y-4">
              @for (course of allCourses; track course.id) {
                <div class="flex items-center gap-3">
                  <a
                    [routerLink]="['/learn']"
                    (click)="selectCourse(course.id)"
                    class="text-[17px] hover:text-cyan-400 transition-colors truncate"
                  >
                    <span class="text-slate-400 font-normal mr-1.5">Learn</span
                    ><span class="font-bold">{{ course.title }}</span>
                  </a>
                  <!-- Badges -->
                  <span
                    class="text-[10px] font-bold uppercase px-1.5 py-0.5 border border-slate-600 rounded text-slate-400 hover:bg-slate-700 cursor-pointer"
                    >Tutorial</span
                  >
                  <span
                    class="text-[10px] font-bold uppercase px-1.5 py-0.5 border border-slate-600 rounded text-cyan-400 hover:bg-cyan-400 hover:text-white cursor-pointer transition-colors"
                    >Beginner</span
                  >
                </div>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
